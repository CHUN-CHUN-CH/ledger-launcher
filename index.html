<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f7f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="手機記帳" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="180x180" href="./apple-touch-icon.png" />
    <title>手機記帳</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef3f1;
        --ink: #172323;
        --muted: #687575;
        --primary: #2f6f7e;
        --income: #23886f;
        --danger: #b64a52;
        --surface: rgba(255, 255, 255, 0.92);
        --soft: #e8efed;
        --border: rgba(22, 38, 38, 0.13);
        --shadow: 0 18px 44px rgba(34, 54, 54, 0.12);
      }

      * { box-sizing: border-box; }

      html, body { min-height: 100%; }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        padding: max(18px, env(safe-area-inset-top)) 14px max(92px, env(safe-area-inset-bottom));
        background:
          linear-gradient(180deg, rgba(196, 211, 207, 0.75), transparent 190px),
          var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      }

      main {
        width: min(100%, 520px);
        margin: 0 auto;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 6px 4px 14px;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .eyebrow {
        display: block;
        margin-bottom: 5px;
        color: var(--primary);
        font-size: 13px;
        font-weight: 800;
      }

      .icon {
        width: 54px;
        height: 54px;
        border-radius: 14px;
        box-shadow: var(--shadow);
      }

      .open-full {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        color: var(--primary);
        font-size: 14px;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .card {
        margin-top: 12px;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 5px;
        padding: 5px;
        border-radius: 8px;
        background: var(--soft);
      }

      button {
        min-height: 48px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-weight: 800;
      }

      .segmented button {
        background: transparent;
        color: #536160;
      }

      .segmented button.active {
        background: #fff;
        color: var(--ink);
        box-shadow: 0 2px 8px rgba(31, 48, 48, 0.08);
      }

      .segmented button[data-type="income"].active { color: var(--income); }

      label {
        display: grid;
        gap: 7px;
        margin-top: 13px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      input, select {
        width: 100%;
        min-height: 52px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-size: 18px;
        padding: 0 13px;
      }

      input[type="date"] { text-align: center; }

      .amount {
        min-height: 76px;
        font-size: 38px;
        font-weight: 800;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 8px;
      }

      .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }

      .chip {
        min-width: 0;
        padding: 0 7px;
        border-color: var(--border);
        overflow-wrap: anywhere;
      }

      .chip.active {
        border-color: var(--primary);
        background: #e6f1f1;
        color: #12383f;
      }

      .split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .submit {
        width: 100%;
        margin-top: 16px;
        min-height: 56px;
        background: var(--primary);
        color: #fff;
        font-size: 18px;
      }

      .submit.income { background: var(--income); }
      .submit:disabled { opacity: 0.55; }

      .status {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        color: var(--muted);
        font-weight: 800;
      }

      .status.ok {
        border-color: rgba(35, 136, 111, 0.28);
        color: #16745d;
        background: #f0faf6;
      }

      .status.error {
        border-color: rgba(182, 74, 82, 0.3);
        color: var(--danger);
        background: #fff4f4;
      }

      details {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
      }

      summary {
        min-height: 48px;
        padding: 13px 14px;
        color: var(--muted);
        font-weight: 800;
      }

      details .inner { padding: 0 14px 14px; }

      .small-button {
        width: 100%;
        margin-top: 10px;
        border-color: var(--border);
        color: var(--primary);
      }

      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 5;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 10px 14px max(10px, env(safe-area-inset-bottom));
        background: rgba(246, 249, 248, 0.92);
        border-top: 1px solid var(--border);
        backdrop-filter: blur(18px);
      }

      .bottom-nav a,
      .bottom-nav button {
        min-height: 52px;
        border-radius: 8px;
        text-decoration: none;
      }

      .bottom-nav a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--primary);
        font-weight: 800;
      }

      @media (max-width: 360px) {
        .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        h1 { font-size: 29px; }
        .amount { font-size: 34px; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <span class="eyebrow">共用帳本</span>
          <h1>手機記帳</h1>
        </div>
        <a class="open-full" href="https://script.google.com/macros/s/AKfycbzTTIWcLmhzvJFV0oP0oMrkr_94Y0te7FXPbAiB54XPRs8_Bi5DLk3p_90dzXYSWjye/exec">查看帳本</a>
      </header>

      <section class="card">
        <div class="segmented" aria-label="收入支出">
          <button type="button" class="active" data-type="expense">支出</button>
          <button type="button" data-type="income">收入</button>
        </div>

        <label>
          金額
          <input id="amount" class="amount" type="number" inputmode="decimal" min="0" step="1" placeholder="0" autocomplete="off" />
        </label>

        <div class="split">
          <label>
            日期
            <input id="date" type="date" />
          </label>
          <label>
            幣別
            <select id="currency">
              <option>TWD</option>
              <option>JPY</option>
              <option>USD</option>
              <option>EUR</option>
              <option>HKD</option>
              <option>KRW</option>
              <option>CNY</option>
            </select>
          </label>
        </div>

        <label>
          帳本
          <div class="grid two" id="scopeGrid"></div>
        </label>

        <label>
          分類
          <div class="grid" id="categoryGrid"></div>
        </label>

        <label>
          品名
          <input id="merchant" type="text" placeholder="例如 午餐、Apple 雲端、藥局" autocomplete="off" />
        </label>

        <label>
          付款方式
          <div class="grid two" id="paymentGrid"></div>
        </label>

        <button id="submit" class="submit" type="button">新增支出</button>
        <div id="status" class="status">尚未送出</div>
      </section>

      <details>
        <summary>設定</summary>
        <div class="inner">
          <label>
            寫入密鑰
            <input id="apiKey" type="password" autocomplete="off" placeholder="第一次使用才需要填" />
          </label>
          <button id="saveKey" class="small-button" type="button">儲存密鑰</button>
        </div>
      </details>

      <nav class="bottom-nav" aria-label="主要操作">
        <button id="navSubmit" class="submit" type="button">新增支出</button>
        <a href="https://script.google.com/macros/s/AKfycbzTTIWcLmhzvJFV0oP0oMrkr_94Y0te7FXPbAiB54XPRs8_Bi5DLk3p_90dzXYSWjye/exec">完整帳本</a>
      </nav>
    </main>

    <script>
      const API_URL = "https://script.google.com/macros/s/AKfycbzTTIWcLmhzvJFV0oP0oMrkr_94Y0te7FXPbAiB54XPRs8_Bi5DLk3p_90dzXYSWjye/exec";
      const KEY_STORAGE = "ledgerShortcutApiKey";

      const expenseCategories = ["餐飲", "交通", "購物", "生活", "娛樂", "醫療", "旅行", "房租", "保險", "訂閱", "分期付款", "投資", "其他支出"];
      const incomeCategories = ["薪資", "獎金", "投資收入", "利息", "退款", "兼職", "禮金", "其他收入"];
      const payments = [
        ["dbs", "星展卡"],
        ["ctbc", "中信卡"],
        ["cathay", "國泰卡"],
        ["jko", "吉鶴卡"],
        ["cash", "現金"],
        ["unknown", "未分類付款"]
      ];
      const scopes = [
        ["personal", "自己花費"],
        ["home", "家裡開銷"]
      ];

      const state = {
        type: "expense",
        scope: localStorage.getItem("ledgerScope") || "personal",
        category: localStorage.getItem("ledgerCategory") || "餐飲",
        payment: localStorage.getItem("ledgerPayment") || "dbs",
        currency: localStorage.getItem("ledgerCurrency") || "TWD"
      };

      const $ = (selector) => document.querySelector(selector);

      function todayIso() {
        const date = new Date();
        date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
        return date.toISOString().slice(0, 10);
      }

      function setStatus(text, type = "") {
        const node = $("#status");
        node.textContent = text;
        node.className = `status ${type}`.trim();
      }

      function renderButtons(id, items, selected, key) {
        $(id).innerHTML = items.map(([value, label]) => (
          `<button class="chip ${value === selected ? "active" : ""}" type="button" data-${key}="${value}">${label}</button>`
        )).join("");
      }

      function render() {
        document.querySelectorAll("[data-type]").forEach((button) => {
          button.classList.toggle("active", button.dataset.type === state.type);
        });
        const categories = state.type === "income" ? incomeCategories : expenseCategories;
        if (!categories.includes(state.category)) state.category = categories[0];
        renderButtons("#scopeGrid", scopes, state.scope, "scope");
        renderButtons("#categoryGrid", categories.map((item) => [item, item]), state.category, "category");
        renderButtons("#paymentGrid", payments, state.payment, "payment");
        $("#submit").classList.toggle("income", state.type === "income");
        $("#submit").textContent = state.type === "income" ? "新增收入" : "新增支出";
        $("#navSubmit").classList.toggle("income", state.type === "income");
        $("#navSubmit").textContent = state.type === "income" ? "新增收入" : "新增支出";
      }

      function storeQueryKey() {
        const url = new URL(location.href);
        const key = url.searchParams.get("key");
        if (!key) return;
        localStorage.setItem(KEY_STORAGE, key);
        $("#apiKey").value = key;
        url.searchParams.delete("key");
        history.replaceState(null, "", url.toString());
      }

      function jsonp(params) {
        return new Promise((resolve, reject) => {
          const callback = `ledgerCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
          const url = new URL(API_URL);
          Object.entries({ ...params, callback }).forEach(([key, value]) => {
            url.searchParams.set(key, value == null ? "" : String(value));
          });
          const script = document.createElement("script");
          const timer = setTimeout(() => {
            cleanup();
            reject(new Error("連線逾時"));
          }, 20000);

          function cleanup() {
            clearTimeout(timer);
            delete window[callback];
            script.remove();
          }

          window[callback] = (payload) => {
            cleanup();
            resolve(payload);
          };
          script.onerror = () => {
            cleanup();
            reject(new Error("送出失敗"));
          };
          script.src = url.toString();
          document.body.appendChild(script);
        });
      }

      async function submit() {
        const amount = Number($("#amount").value || 0);
        const merchant = $("#merchant").value.trim();
        const key = localStorage.getItem(KEY_STORAGE) || $("#apiKey").value.trim();
        if (!key) {
          setStatus("請先在設定儲存寫入密鑰", "error");
          document.querySelector("details").open = true;
          return;
        }
        if (!amount || amount <= 0) {
          setStatus("請輸入金額", "error");
          $("#amount").focus();
          return;
        }
        if (!merchant) {
          setStatus("請輸入品名", "error");
          $("#merchant").focus();
          return;
        }

        localStorage.setItem(KEY_STORAGE, key);
        localStorage.setItem("ledgerScope", state.scope);
        localStorage.setItem("ledgerCategory", state.category);
        localStorage.setItem("ledgerPayment", state.payment);
        localStorage.setItem("ledgerCurrency", $("#currency").value);

        $("#submit").disabled = true;
        setStatus("正在寫入帳本...");
        try {
          const result = await jsonp({
            action: "shortcutCreate",
            key,
            type: state.type,
            scope: state.scope,
            category: state.category,
            merchant,
            amount,
            currency: $("#currency").value,
            payment: state.payment,
            date: $("#date").value || todayIso()
          });
          if (!result || !result.ok) throw new Error((result && result.error) || "寫入失敗");
          setStatus(`已新增：${merchant} $${amount.toLocaleString("zh-TW")}`, "ok");
          $("#amount").value = "";
          $("#merchant").value = "";
          $("#amount").focus();
        } catch (error) {
          setStatus(String(error.message || error), "error");
        } finally {
          $("#submit").disabled = false;
        }
      }

      document.addEventListener("click", (event) => {
        const type = event.target.closest("[data-type]");
        if (type) {
          state.type = type.dataset.type;
          state.category = state.type === "income" ? incomeCategories[0] : expenseCategories[0];
          render();
          return;
        }
        const scope = event.target.closest("[data-scope]");
        if (scope) {
          state.scope = scope.dataset.scope;
          render();
          return;
        }
        const category = event.target.closest("[data-category]");
        if (category) {
          state.category = category.dataset.category;
          render();
          return;
        }
        const payment = event.target.closest("[data-payment]");
        if (payment) {
          state.payment = payment.dataset.payment;
          render();
        }
      });

      $("#submit").addEventListener("click", submit);
      $("#navSubmit").addEventListener("click", submit);
      $("#saveKey").addEventListener("click", () => {
        const key = $("#apiKey").value.trim();
        if (!key) {
          setStatus("密鑰不能空白", "error");
          return;
        }
        localStorage.setItem(KEY_STORAGE, key);
        setStatus("密鑰已存在這台手機", "ok");
      });
      $("#currency").addEventListener("change", () => {
        state.currency = $("#currency").value;
        localStorage.setItem("ledgerCurrency", state.currency);
      });

      $("#date").value = todayIso();
      $("#currency").value = state.currency;
      storeQueryKey();
      $("#apiKey").value = localStorage.getItem(KEY_STORAGE) || "";
      render();
    </script>
  </body>
</html>
